version: "3.9"

services:
  app:
    build: .
    container_name: simpai_app
    env_file:
      - .env.production.example
    environment:
      DATABASE_URL: postgresql+psycopg://simpai:simpai_password@postgres:5432/simpai
      REDIS_URL: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/1
      CACHE_TYPE: RedisCache
      PORT: 5001
    depends_on:
      - postgres
      - redis
    ports:
      - "5001:5001"

  postgres:
    image: postgres:16
    container_name: simpai_postgres
    environment:
      POSTGRES_USER: simpai
      POSTGRES_PASSWORD: simpai_password
      POSTGRES_DB: simpai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: simpai_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
